name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip project
        run: unzip FitnessMotivator-1.zip
      - name: Build APK
        working-directory: FitnessMotivator
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitnessMotivator-APK
          path: FitnessMotivator/app/build/outputs/apk/debug/app-debug.apk
