name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip
        run: unzip FitnessMotivator-1.zip
      - name: Build
        working-directory: FitnessMotivator
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: FitnessMotivator/app/build/outputs/apk/debug/app-debug.apk
